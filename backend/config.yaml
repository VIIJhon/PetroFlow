# Petroflow Configuration File
# Author: Jhon Villegas
# Purpose: Centralized configuration for all Petroflow settings
# Cost: $0 (no external dependencies required)

# Application Settings
application:
  name: "Petroflow"
  version: "3.0.0"
  environment: "development"  # development, staging, production
  debug: true
  timezone: "UTC"

# Server Configuration
server:
  host: "0.0.0.0"
  port: 8000
  workers: 4
  reload: true  # Auto-reload on code changes (development only)
  log_level: "info"  # debug, info, warning, error, critical

# Database Configuration
database:
  # SQLite (Development)
  type: "sqlite"
  path: "petroflow.db"
  
  # PostgreSQL (Production) - Uncomment when ready
  # type: "postgresql"
  # host: "localhost"
  # port: 5432
  # name: "petroflow"
  # user: "petroflow_user"
  # password: "your_secure_password"
  # pool_size: 10
  # max_overflow: 20
  
  # Backup Settings
  backup:
    enabled: true
    directory: "storage/backups"
    keep_count: 10
    compress: true
    auto_backup_interval: 86400  # seconds (24 hours)

# Security Settings
security:
  secret_key: "your-secret-key-change-in-production"
  algorithm: "HS256"
  access_token_expire_minutes: 30
  refresh_token_expire_days: 7
  
  # CORS Settings
  cors:
    enabled: true
    origins:
      - "http://localhost:3000"
      - "http://localhost:8000"
      - "http://127.0.0.1:3000"
      - "http://127.0.0.1:8000"
    allow_credentials: true
    allow_methods: ["*"]
    allow_headers: ["*"]
  
  # Rate Limiting
  rate_limit:
    enabled: true
    requests_per_minute: 60
    burst_size: 10

# Equipment Standards Configuration
standards:
  # API 610 - Centrifugal Pumps
  api_610:
    vibration_limits:
      zone_a: 2.8  # mm/s RMS
      zone_b: 4.5
      zone_c: 7.1
      zone_d: 11.2
    temperature_limits:
      bearing_max: 82  # °C
      seal_max: 95
    pressure_limits:
      discharge_max: 350  # bar
      suction_min: 0.5
  
  # API 617 - Centrifugal Compressors
  api_617:
    vibration_limits:
      zone_a: 3.0  # mm/s RMS
      zone_b: 4.5
      zone_c: 7.1
      zone_d: 11.2
    temperature_limits:
      bearing_max: 90  # °C
      discharge_max: 200
    pressure_limits:
      discharge_max: 15  # bar
      suction_min: 0.8
  
  # API 611 - Steam Turbines
  api_611:
    vibration_limits:
      zone_a: 3.5  # mm/s RMS
      zone_b: 5.6
      zone_c: 8.9
      zone_d: 14.0
    temperature_limits:
      bearing_max: 95  # °C
      inlet_max: 600
    pressure_limits:
      inlet_max: 60  # bar
      exhaust_min: 0.05
  
  # ISO 10816 - Vibration Standards
  iso_10816:
    class_1:  # Small machines
      zone_a: 0.71
      zone_b: 1.8
      zone_c: 4.5
      zone_d: 7.1
    class_2:  # Medium machines
      zone_a: 1.12
      zone_b: 2.8
      zone_c: 7.1
      zone_d: 11.2
    class_3:  # Large machines (rigid foundation)
      zone_a: 1.8
      zone_b: 4.5
      zone_c: 11.2
      zone_d: 18.0
    class_4:  # Large machines (flexible foundation)
      zone_a: 2.8
      zone_b: 7.1
      zone_c: 18.0
      zone_d: 28.0

# Unit Conversion Settings
units:
  default_system: "SI"  # SI or Imperial
  
  # Pressure conversions
  pressure:
    si_unit: "bar"
    imperial_unit: "psi"
    conversion_factor: 14.5038  # bar to psi
  
  # Temperature conversions
  temperature:
    si_unit: "celsius"
    imperial_unit: "fahrenheit"
    absolute_si: "kelvin"
    absolute_imperial: "rankine"
  
  # Flow rate conversions
  flow:
    si_unit: "m3/h"
    imperial_unit: "gpm"
    conversion_factor: 4.40287  # m3/h to gpm
  
  # Vibration conversions
  vibration:
    si_unit: "mm/s"
    imperial_unit: "in/s"
    conversion_factor: 0.03937  # mm/s to in/s

# Telemetry & IoT Settings
telemetry:
  enabled: true
  
  # MQTT Configuration
  mqtt:
    enabled: false
    broker: "localhost"
    port: 1883
    username: ""
    password: ""
    topics:
      equipment: "petroflow/equipment/#"
      alarms: "petroflow/alarms/#"
      commands: "petroflow/commands/#"
    qos: 1
    keepalive: 60
  
  # OPC UA Configuration
  opcua:
    enabled: false
    endpoint: "opc.tcp://localhost:4840"
    security_policy: "None"
    security_mode: "None"
  
  # Data Processing
  processing:
    buffer_size: 1000
    batch_size: 100
    flush_interval: 5  # seconds
    anomaly_detection: true
    anomaly_threshold: 3.0  # standard deviations

# Analysis Engine Settings
analysis:
  # Weibull Analysis
  weibull:
    confidence_level: 0.95
    min_samples: 10
    max_iterations: 1000
  
  # Kaplan-Meier
  kaplan_meier:
    confidence_level: 0.95
    min_events: 5
  
  # Jackknife Resampling
  jackknife:
    confidence_level: 0.95
    min_samples: 20
  
  # FFT Analysis
  fft:
    window_size: 1024
    overlap: 0.5
    window_type: "hann"
  
  # Machine Learning
  ml:
    enabled: false
    model_path: "storage/models"
    retrain_interval: 604800  # seconds (7 days)
    min_training_samples: 1000

# Simulation Settings
simulation:
  default_duration: 3600  # seconds (1 hour)
  default_time_step: 60  # seconds (1 minute)
  max_duration: 86400  # seconds (24 hours)
  min_time_step: 1  # seconds
  
  # Numerical solver settings
  solver:
    method: "rk45"  # runge-kutta 4th/5th order
    tolerance: 1e-6
    max_steps: 10000

# Optimization Settings
optimization:
  enabled: true
  
  # Operational Optimizer
  operational:
    algorithm: "scipy_minimize"  # scipy_minimize, genetic, particle_swarm
    max_iterations: 100
    tolerance: 1e-4
    constraints_enabled: true
  
  # Vectorization
  vectorization:
    enabled: true
    chunk_size: 1000
    parallel_processing: false  # Requires additional setup

# Reporting Settings
reporting:
  enabled: true
  output_directory: "storage/reports"
  formats:
    - "pdf"
    - "html"
    - "json"
  
  # Report Templates
  templates:
    equipment_health: "templates/equipment_health.html"
    failure_prediction: "templates/failure_prediction.html"
    optimization: "templates/optimization.html"
  
  # Auto-generation
  auto_generate:
    enabled: false
    schedule: "daily"  # daily, weekly, monthly
    time: "00:00"  # HH:MM format

# Logging Settings
logging:
  level: "INFO"  # DEBUG, INFO, WARNING, ERROR, CRITICAL
  
  # File logging
  file:
    enabled: true
    directory: "logs"
    max_size: 10485760  # 10 MB
    backup_count: 5
    format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  
  # Console logging
  console:
    enabled: true
    format: "%(levelname)s: %(message)s"
  
  # Specific loggers
  loggers:
    database: "INFO"
    api: "INFO"
    telemetry: "INFO"
    analysis: "INFO"
    security: "WARNING"

# Cache Settings
cache:
  enabled: true
  type: "memory"  # memory, redis
  
  # Memory cache
  memory:
    max_size: 1000
    ttl: 3600  # seconds (1 hour)
  
  # Redis cache (when enabled)
  redis:
    host: "localhost"
    port: 6379
    db: 0
    password: ""
    ttl: 3600

# Feature Flags
features:
  equipment_classification: true
  safety_validation: true
  operational_optimization: true
  telemetry_processing: true
  simulation_engine: true
  failure_prediction: true
  report_generation: true
  api_v2: true
  websockets: true
  demo_dashboard: true
  
  # Advanced features (may require additional setup)
  machine_learning: false
  distributed_processing: false
  cloud_integration: false
  mobile_app: false

# Maintenance Settings
maintenance:
  # Database maintenance
  database_vacuum: true
  vacuum_schedule: "weekly"
  
  # Log rotation
  log_rotation: true
  log_retention_days: 30
  
  # Backup rotation
  backup_rotation: true
  backup_retention_count: 10

# Development Settings (only for development environment)
development:
  mock_data: true
  sample_data_generator: true
  debug_toolbar: true
  profiling: false
  test_mode: false

# Production Settings (only for production environment)
production:
  ssl_enabled: false
  ssl_cert_path: ""
  ssl_key_path: ""
  
  # Monitoring
  monitoring:
    enabled: false
    prometheus_port: 9090
    health_check_interval: 60
  
  # High Availability
  ha:
    enabled: false
    cluster_nodes: []
    consensus_algorithm: "raft"

# Integration Settings
integrations:
  # SAP PM
  sap_pm:
    enabled: false
    endpoint: ""
    username: ""
    password: ""
  
  # Oracle EAM
  oracle_eam:
    enabled: false
    endpoint: ""
    username: ""
    password: ""
  
  # External APIs
  external_apis:
    weather: false
    market_data: false
    regulatory: false

# Notification Settings
notifications:
  enabled: false
  
  # Email
  email:
    enabled: false
    smtp_host: ""
    smtp_port: 587
    username: ""
    password: ""
    from_address: ""
  
  # SMS
  sms:
    enabled: false
    provider: ""
    api_key: ""
  
  # Webhooks
  webhooks:
    enabled: false
    endpoints: []

# License Settings
license:
  type: "development"  # development, trial, commercial, enterprise
  expires: null
  features: []
  max_equipment: 100
  max_users: 10