runtime: python311
entrypoint: uvicorn app.main:app --host 0.0.0.0 --port $PORT

instance_class: F1

# Entorno de producción y variables
env_variables:
  APP_ENV: 'production'
  DATABASE_URL: 'sqlite:///petroflow.db'

# Delegar el servicio de estáticos al CDN de Google
handlers:
- url: /static
  static_dir: static
- url: /.*
  script: auto
