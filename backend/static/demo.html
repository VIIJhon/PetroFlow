<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Petroflow - Equipment Monitoring Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            background: white;
            padding: 20px 30px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
        }

        h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 5px;
        }

        .subtitle {
            color: #666;
            font-size: 14px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .card {
            background: white;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #f0f0f0;
        }

        .card-title {
            font-size: 18px;
            font-weight: 600;
            color: #333;
        }

        .status-badge {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .status-normal {
            background: #d4edda;
            color: #155724;
        }

        .status-warning {
            background: #fff3cd;
            color: #856404;
        }

        .status-critical {
            background: #f8d7da;
            color: #721c24;
        }

        .metric {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #f0f0f0;
        }

        .metric:last-child {
            border-bottom: none;
        }

        .metric-label {
            color: #666;
            font-size: 14px;
        }

        .metric-value {
            font-weight: 600;
            color: #333;
            font-size: 14px;
        }

        .controls {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
        }

        .button-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5568d3;
        }

        .btn-success {
            background: #28a745;
            color: white;
        }

        .btn-success:hover {
            background: #218838;
        }

        .btn-warning {
            background: #ffc107;
            color: #333;
        }

        .btn-warning:hover {
            background: #e0a800;
        }

        .btn-danger {
            background: #dc3545;
            color: white;
        }

        .btn-danger:hover {
            background: #c82333;
        }

        .chart-container {
            position: relative;
            height: 300px;
            margin-top: 20px;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        .error {
            background: #f8d7da;
            color: #721c24;
            padding: 15px;
            border-radius: 5px;
            margin: 10px 0;
        }

        .success {
            background: #d4edda;
            color: #155724;
            padding: 15px;
            border-radius: 5px;
            margin: 10px 0;
        }

        .api-status {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 5px;
        }

        .api-online {
            background: #28a745;
        }

        .api-offline {
            background: #dc3545;
        }

        footer {
            text-align: center;
            color: white;
            margin-top: 30px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Petroflow Equipment Monitoring</h1>
            <p class="subtitle">
                <span class="api-status" id="apiStatus"></span>
                Real-time Industrial Equipment Analysis | Author: Jhon Villegas
            </p>
        </header>

        <div class="controls">
            <div class="button-group">
                <button class="btn-success" onclick="loadSampleData('normal')">Load Normal Data</button>
                <button class="btn-warning" onclick="loadSampleData('warning')">Load Warning Data</button>
                <button class="btn-danger" onclick="loadSampleData('critical')">Load Critical Data</button>
                <button class="btn-primary" onclick="validateEquipment()">Validate Equipment</button>
                <button class="btn-primary" onclick="runSimulation()">Run Simulation</button>
            </div>
            <div id="message"></div>
        </div>

        <div class="grid" id="equipmentGrid">
            <div class="loading">Loading equipment data...</div>
        </div>

        <div class="card">
            <div class="card-header">
                <h2 class="card-title">Vibration Analysis</h2>
            </div>
            <div class="chart-container">
                <canvas id="vibrationChart"></canvas>
            </div>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 Petroflow - Industrial Equipment Optimization Platform</p>
        <p>Zero-Cost Demo Dashboard | FastAPI Backend</p>
    </footer>

    <script>
        // Configuration
        const API_BASE = 'http://localhost:8000/api/v2';
        let currentData = null;
        let vibrationChart = null;

        // Check API status
        async function checkAPIStatus() {
            try {
                const response = await fetch(`${API_BASE}/health`);
                if (response.ok) {
                    document.getElementById('apiStatus').className = 'api-status api-online';
                    return true;
                }
            } catch (error) {
                document.getElementById('apiStatus').className = 'api-status api-offline';
                return false;
            }
        }

        // Load sample data
        function loadSampleData(condition) {
            const sampleData = {
                normal: {
                    equipment_id: "P-101",
                    equipment_type: "PUMP_CENTRIFUGAL",
                    parameters: {
                        discharge_pressure: 265,
                        suction_pressure: 2.0,
                        flow_rate: 425,
                        temperature: 68,
                        speed: 3550,
                        vibration_velocity: 2.1,
                        bearing_temperature: 58,
                        power: 200
                    }
                },
                warning: {
                    equipment_id: "C-201",
                    equipment_type: "COMPRESSOR_CENTRIFUGAL",
                    parameters: {
                        suction_pressure: 1.3,
                        discharge_pressure: 12.0,
                        suction_temperature: 38,
                        discharge_temperature: 162,
                        flow_rate: 7500,
                        speed: 11500,
                        vibration_velocity: 4.5,
                        power: 620
                    }
                },
                critical: {
                    equipment_id: "T-301",
                    equipment_type: "TURBINE_STEAM",
                    parameters: {
                        inlet_pressure: 56,
                        exhaust_pressure: 0.22,
                        inlet_temperature: 565,
                        exhaust_temperature: 188,
                        speed: 6150,
                        power_output: 3850,
                        vibration_velocity: 6.5,
                        bearing_temperature: 95
                    }
                }
            };

            currentData = sampleData[condition];
            displayEquipment(currentData);
            showMessage(`Loaded ${condition} condition data`, 'success');
        }

        // Display equipment data
        function displayEquipment(data) {
            const grid = document.getElementById('equipmentGrid');
            
            const statusClass = getStatusClass(data);
            const statusText = statusClass.replace('status-', '').toUpperCase();

            let html = `
                <div class="card">
                    <div class="card-header">
                        <h3 class="card-title">${data.equipment_id}</h3>
                        <span class="status-badge ${statusClass}">${statusText}</span>
                    </div>
                    <div class="metric">
                        <span class="metric-label">Type</span>
                        <span class="metric-value">${data.equipment_type}</span>
                    </div>
            `;

            for (const [key, value] of Object.entries(data.parameters)) {
                const label = key.replace(/_/g, ' ').replace(/\b\w/g, l => l.toUpperCase());
                html += `
                    <div class="metric">
                        <span class="metric-label">${label}</span>
                        <span class="metric-value">${typeof value === 'number' ? value.toFixed(2) : value}</span>
                    </div>
                `;
            }

            html += '</div>';
            grid.innerHTML = html;

            // Update chart
            updateVibrationChart(data);
        }

        // Get status class based on parameters
        function getStatusClass(data) {
            const params = data.parameters;
            
            if (params.vibration_velocity > 5.0 || params.temperature > 90) {
                return 'status-critical';
            } else if (params.vibration_velocity > 4.0 || params.temperature > 80) {
                return 'status-warning';
            }
            return 'status-normal';
        }

        // Validate equipment via API
        async function validateEquipment() {
            if (!currentData) {
                showMessage('Please load sample data first', 'error');
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/equipment/validate`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(currentData)
                });

                if (response.ok) {
                    const result = await response.json();
                    showMessage(`Validation complete: ${result.status}`, 'success');
                    console.log('Validation result:', result);
                } else {
                    showMessage('Validation failed', 'error');
                }
            } catch (error) {
                showMessage(`API Error: ${error.message}`, 'error');
            }
        }

        // Run simulation
        async function runSimulation() {
            if (!currentData) {
                showMessage('Please load sample data first', 'error');
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/simulation/run`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        equipment_data: currentData,
                        duration: 3600,
                        time_step: 60
                    })
                });

                if (response.ok) {
                    const result = await response.json();
                    showMessage('Simulation completed successfully', 'success');
                    console.log('Simulation result:', result);
                } else {
                    showMessage('Simulation failed', 'error');
                }
            } catch (error) {
                showMessage(`API Error: ${error.message}`, 'error');
            }
        }

        // Update vibration chart
        function updateVibrationChart(data) {
            const ctx = document.getElementById('vibrationChart').getContext('2d');
            
            // Generate time series data
            const labels = [];
            const vibrationData = [];
            const baseVibration = data.parameters.vibration_velocity || 2.0;
            
            for (let i = 0; i < 24; i++) {
                labels.push(`${i}:00`);
                vibrationData.push(baseVibration + (Math.random() - 0.5) * 0.5);
            }

            if (vibrationChart) {
                vibrationChart.destroy();
            }

            vibrationChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Vibration Velocity (mm/s)',
                        data: vibrationData,
                        borderColor: '#667eea',
                        backgroundColor: 'rgba(102, 126, 234, 0.1)',
                        tension: 0.4,
                        fill: true
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            display: true,
                            position: 'top'
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            title: {
                                display: true,
                                text: 'Vibration (mm/s)'
                            }
                        },
                        x: {
                            title: {
                                display: true,
                                text: 'Time (hours)'
                            }
                        }
                    }
                }
            });
        }

        // Show message
        function showMessage(text, type) {
            const messageDiv = document.getElementById('message');
            messageDiv.className = type;
            messageDiv.textContent = text;
            messageDiv.style.display = 'block';
            
            setTimeout(() => {
                messageDiv.style.display = 'none';
            }, 5000);
        }

        // Initialize
        window.onload = async function() {
            await checkAPIStatus();
            loadSampleData('normal');
            
            // Check API status every 30 seconds
            setInterval(checkAPIStatus, 30000);
        };
    </script>
</body>
</html>
