services:
  # Backend FastAPI
  - type: web
    name: petroflow-backend
    env: python
    buildCommand: "pip install -r backend/requirements.txt"
    startCommand: "cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: DATABASE_URL
        value: sqlite:///./petroflow.db # Para prueba gratuita sin base de datos en la nube externa.
